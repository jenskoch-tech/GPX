<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Trail Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100%; width: 100%; z-index: 1; background: #e5e7eb; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .selected-row { background-color: #f0f9ff; border-left: 4px solid #0284c7 !important; }
        /* Spinner for loading state */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden">

    <!-- Header -->
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm relative z-10">
        <div class="flex items-center gap-3">
            <div class="bg-slate-800 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </div>
            <h1 class="text-lg font-bold text-slate-800 tracking-tight">GPX Trail Splitter</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="loadingStatus" class="hidden flex items-center gap-2 text-sm text-slate-500">
                <div class="loader"></div> <span>Processing...</span>
            </div>
            <button id="downloadSelected" class="hidden bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-all flex items-center gap-2 shadow-md">
                Download Selected (.zip)
            </button>
        </div>
    </nav>

    <main class="flex h-[calc(100vh-60px)]">
        
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-100">
                <div id="dropzone" class="border-2 border-dashed border-slate-200 rounded-lg p-4 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer">
                    <input type="file" id="fileInput" class="hidden" accept=".gpx">
                    <p class="text-sm font-bold text-slate-600">Load GPX File</p>
                    <p class="text-[10px] text-slate-400 uppercase mt-1">Drag & Drop</p>
                </div>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col">
                <div class="px-4 py-2 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Segments</span>
                    <span id="counter" class="bg-slate-200 text-slate-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="sectionList" class="flex-1 overflow-y-auto custom-scrollbar divide-y divide-slate-100 italic text-slate-400 text-sm text-center p-4">
                    Upload a file to begin
                </div>
            </div>
        </aside>

        <!-- Map -->
        <section class="flex-1 relative">
            <div id="map"></div>
            
            <!-- Info Card (Bottom Left) -->
            <div id="mapOverlay" class="absolute bottom-6 left-6 z-[1000] bg-white/95 backdrop-blur shadow-2xl rounded-xl border border-slate-200 p-4 hidden min-w-[240px]">
                <h3 id="overlayName" class="font-bold text-slate-800 text-sm mb-2 truncate max-w-[200px]">Section Name</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-[9px] uppercase font-bold text-slate-400">Nodes</p>
                        <p id="overlayPoints" class="text-xs font-mono text-slate-700">-</p>
                    </div>
                    <div>
                        <p class="text-[9px] uppercase font-bold text-slate-400">Type</p>
                        <p id="overlayType" class="text-xs font-mono text-slate-700">-</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let map;
        let currentLayer = null;
        let sections = [];

        function initMap() {
            // OPTIMIZATION: preferCanvas: true makes polyline rendering significantly faster
            map = L.map('map', {
                center: [41.8719, 12.5674],
                zoom: 5,
                preferCanvas: true
            });

            const googleTerrain = L.tileLayer('http://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google'
            });
            const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google'
            });
            const googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google'
            });

            googleTerrain.addTo(map);
            L.control.layers({ "Terrain": googleTerrain, "Satellite": googleSat, "Streets": googleStreets }, null, { position: 'topright' }).addTo(map);
        }

        window.onload = initMap;

        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const sectionList = document.getElementById('sectionList');

        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleUpload(file);
        };

        async function handleUpload(file) {
            document.getElementById('loadingStatus').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (e) => {
                await parseGPX(e.target.result);
                document.getElementById('loadingStatus').classList.add('hidden');
            };
            reader.readAsText(file);
        }

        function parseGPX(xmlText) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");
            sections = [];

            // Helper to parse coordinates once and store them
            const extractCoords = (selector, ptSelector) => {
                xml.querySelectorAll(selector).forEach((el, i) => {
                    const name = el.querySelector('name')?.textContent || `${selector} ${i+1}`;
                    const points = Array.from(el.querySelectorAll(ptSelector)).map(pt => [
                        parseFloat(pt.getAttribute('lat')),
                        parseFloat(pt.getAttribute('lon'))
                    ]);
                    if (points.length > 0) {
                        sections.push({ name, points, type: selector === 'trk' ? 'Track' : 'Route', element: el });
                    }
                });
            };

            extractCoords('trk', 'trkpt');
            extractCoords('rte', 'rtept');
            renderList();
        }

        function renderList() {
            sectionList.innerHTML = '';
            sectionList.classList.remove('italic', 'text-center', 'p-4');
            document.getElementById('counter').textContent = sections.length;
            document.getElementById('downloadSelected').classList.remove('hidden');

            sections.forEach((sec, i) => {
                const item = document.createElement('div');
                item.className = "p-3 hover:bg-slate-50 cursor-pointer flex items-center gap-3 border-l-4 border-transparent transition-all";
                item.id = `item-${i}`;
                item.innerHTML = `
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-blue-600 cursor-pointer" data-index="${i}">
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold text-slate-700 truncate">${sec.name}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${sec.points.length} pts</p>
                    </div>
                `;
                item.onclick = (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        document.querySelectorAll('#sectionList > div').forEach(el => el.classList.remove('selected-row'));
                        item.classList.add('selected-row');
                        previewOnMap(i);
                    }
                };
                sectionList.appendChild(item);
            });
        }

        function previewOnMap(index) {
            const sec = sections[index];
            
            // OPTIMIZATION: Remove old layer before drawing new one
            if (currentLayer) {
                map.removeLayer(currentLayer);
            }

            // OPTIMIZATION: smoothFactor ignores points that are too close at current zoom
            currentLayer = L.polyline(sec.points, {
                color: '#0284c7',
                weight: 4,
                opacity: 0.9,
                smoothFactor: 1.5 
            }).addTo(map);

            // Instant fit bounds
            const bounds = currentLayer.getBounds();
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [40, 40], animate: false });
            }

            document.getElementById('mapOverlay').classList.remove('hidden');
            document.getElementById('overlayName').textContent = sec.name;
            document.getElementById('overlayPoints').textContent = sec.points.length.toLocaleString();
            document.getElementById('overlayType').textContent = sec.type;
        }

        document.getElementById('downloadSelected').onclick = async () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checkboxes.length === 0) return alert("Please select sections from the list first.");

            const zip = new JSZip();
            checkboxes.forEach(cb => {
                const idx = cb.dataset.index;
                const sec = sections[idx];
                zip.file(`${sec.name.replace(/[/\\?%*:|"<>]/g, '-')}.gpx`, createGPX(sec));
            });

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "TET_Sections.zip";
            link.click();
        };

        function createGPX(sec) {
            return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPX Trail Splitter" xmlns="http://www.topografix.com/GPX/1/1">
<metadata><name>${sec.name}</name></metadata>
${new XMLSerializer().serializeToString(sec.element)}
</gpx>`;
        }
    </script>
</body>
</html>
