<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX Trail Splitter</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
#map { height: 100%; width: 100%; }
.loader { border:3px solid #eee;border-top:3px solid #3498db;border-radius:50%;width:18px;height:18px;animation:spin 1s linear infinite;}
@keyframes spin {100%{transform:rotate(360deg)}}
.selected {background:#e0f2fe;border-left:4px solid #0284c7;}
</style>
</head>

<body class="bg-slate-50 text-slate-900 overflow-hidden">

<nav class="bg-white border-b px-6 py-3 flex justify-between items-center">
<h1 class="font-bold">GPX Trail Splitter</h1>

<div class="flex gap-3 items-center">
<div id="loading" class="hidden flex items-center gap-2 text-sm">
<div class="loader"></div> Processing
</div>
<button id="download" class="hidden bg-blue-600 text-white px-4 py-2 rounded">Download</button>
</div>
</nav>

<main class="flex h-[calc(100vh-60px)]">

<aside class="w-80 bg-white border-r flex flex-col">

<div class="p-4 border-b">
<div id="dropzone" class="border-2 border-dashed p-4 text-center cursor-pointer">
<input type="file" id="fileInput" hidden accept=".gpx">
<p class="font-bold">Load GPX</p>
<p class="text-xs">Drag & Drop</p>
</div>
</div>

<div class="flex justify-between px-4 py-2 bg-slate-50 text-xs">
<span>Segments</span>
<button id="selectAll">Select All</button>
</div>

<div id="list" class="flex-1 overflow-auto text-sm text-center p-4 italic">
Upload a file
</div>

</aside>

<section class="flex-1">
<div id="map"></div>
</section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let map, layer;
let sections = [];

function initMap() {
map = L.map('map', { preferCanvas:true }).setView([0,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);
}

window.onload = initMap;

const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const list = document.getElementById('list');
const loading = document.getElementById('loading');
const downloadBtn = document.getElementById('download');

dropzone.onclick = () => fileInput.click();

dropzone.ondragover = e => {
e.preventDefault();
dropzone.classList.add('bg-blue-50');
};

dropzone.ondragleave = () => {
dropzone.classList.remove('bg-blue-50');
};

dropzone.ondrop = e => {
e.preventDefault();
dropzone.classList.remove('bg-blue-50');
handleFile(e.dataTransfer.files[0]);
};

fileInput.onchange = e => handleFile(e.target.files[0]);

function handleFile(file) {
if (!file || !file.name.endsWith('.gpx')) {
alert('Invalid GPX file');
return;
}

loading.classList.remove('hidden');

const reader = new FileReader();
reader.onload = e => {
try {
parseGPX(e.target.result);
} catch (err) {
alert('Failed to parse GPX');
}
loading.classList.add('hidden');
};
reader.readAsText(file);
}

function parseGPX(text) {
const xml = new DOMParser().parseFromString(text, 'text/xml');

sections = [];

xml.querySelectorAll('trk').forEach((trk,i)=>{
const name = trk.querySelector('name')?.textContent || `Track ${i+1}`;

trk.querySelectorAll('trkseg').forEach((seg,j)=>{
const points = [];

seg.querySelectorAll('trkpt').forEach(pt=>{
const lat = parseFloat(pt.getAttribute('lat'));
const lon = parseFloat(pt.getAttribute('lon'));
if (!isNaN(lat) && !isNaN(lon)) points.push([lat,lon]);
});

if (points.length) {
sections.push({
name: `${name} (${j+1})`,
points,
type:'Track'
});
}
});
});

xml.querySelectorAll('rte').forEach((rte,i)=>{
const name = rte.querySelector('name')?.textContent || `Route ${i+1}`;

const points = [];
rte.querySelectorAll('rtept').forEach(pt=>{
const lat = parseFloat(pt.getAttribute('lat'));
const lon = parseFloat(pt.getAttribute('lon'));
if (!isNaN(lat) && !isNaN(lon)) points.push([lat,lon]);
});

if (points.length) {
sections.push({ name, points, type:'Route' });
}
});

renderList();
}

function renderList() {
list.innerHTML = '';
downloadBtn.classList.remove('hidden');

sections.forEach((s,i)=>{
const el = document.createElement('div');

el.className = "p-2 flex items-center gap-2 border-l-4 border-transparent cursor-pointer";

el.innerHTML = `
<input type="checkbox" data-i="${i}">
<div class="flex-1 text-left">
<div class="font-bold text-xs">${s.name}</div>
<div class="text-[10px] text-gray-400">${s.points.length} pts</div>
</div>
`;

el.onclick = e=>{
if (e.target.tagName !== 'INPUT') {
document.querySelectorAll('#list > div').forEach(x=>x.classList.remove('selected'));
el.classList.add('selected');
preview(i);
}
};

list.appendChild(el);
});
}

function preview(i) {
if (layer) map.removeLayer(layer);

layer = L.polyline(sections[i].points,{
color:'#0284c7',
weight:4
}).addTo(map);

map.fitBounds(layer.getBounds(),{padding:[20,20]});
}

document.getElementById('selectAll').onclick = ()=>{
document.querySelectorAll('#list input').forEach(cb=>cb.checked = true);
};

downloadBtn.onclick = async ()=>{
const checked = [...document.querySelectorAll('#list input:checked')];

if (!checked.length) {
alert('Select items first');
return;
}

const zip = new JSZip();

checked.forEach(cb=>{
const s = sections[cb.dataset.i];
zip.file(`${sanitize(s.name)}.gpx`, buildGPX(s));
});

const blob = await zip.generateAsync({type:'blob'});
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = 'sections.zip';
a.click();
};

function sanitize(name) {
return name.replace(/[/\\?%*:|"<>]/g,'-').slice(0,100);
}

function buildGPX(sec) {
const pts = sec.points.map(p=>`<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('');

return `<?xml version="1.0"?>
<gpx version="1.1" creator="Splitter">
<trk><name>${sec.name}</name><trkseg>${pts}</trkseg></trk>
</gpx>`;
}
</script>

</body>
</html>
