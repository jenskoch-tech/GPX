<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Trail Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: calc(100vh - 200px); border-radius: 12px; z-index: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .selected-row { background-color: #eff6ff; border-left: 4px solid #2563eb !important; }
        .leaflet-control-layers { border: none !important; border-radius: 8px !important; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden">

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">GPX Trail Splitter</h1>
        </div>
        <button id="downloadSelected" class="hidden bg-blue-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-all flex items-center gap-2 shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
            Download Selected (.zip)
        </button>
    </nav>

    <main class="flex h-[calc(100vh-73px)]">
        
        <!-- Left Sidebar -->
        <aside class="w-96 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <!-- Upload Box -->
            <div class="p-6 border-b border-slate-100">
                <div id="dropzone" class="group border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer">
                    <input type="file" id="fileInput" class="hidden" accept=".gpx">
                    <svg class="mx-auto h-8 w-8 text-slate-400 group-hover:text-blue-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="text-sm font-bold text-slate-600">Click to load GPX</p>
                    <p class="text-xs text-slate-400 mt-1">Drag and drop file here</p>
                </div>
            </div>

            <!-- List Container -->
            <div class="flex-1 overflow-hidden flex flex-col">
                <div class="px-6 py-3 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Segments Found</span>
                    <span id="counter" class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="sectionList" class="flex-1 overflow-y-auto custom-scrollbar divide-y divide-slate-100">
                    <div class="p-10 text-center">
                        <p class="text-sm text-slate-400 italic">No file loaded yet</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <section class="flex-1 p-6 bg-slate-100 relative">
            <div id="map" class="shadow-xl border border-white"></div>
            
            <!-- Floating Overlay Info -->
            <div id="mapOverlay" class="absolute bottom-10 left-10 z-[1000] bg-white/90 backdrop-blur-md p-4 rounded-xl shadow-2xl border border-white hidden min-w-[200px]">
                <p id="overlayName" class="text-sm font-bold text-slate-800">-</p>
                <div class="flex gap-4 mt-1">
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Points</p>
                        <p id="overlayPoints" class="text-xs font-mono text-slate-600">-</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Type</p>
                        <p id="overlayType" class="text-xs font-mono text-slate-600">-</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- JS for Zip functionality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let map;
        let currentLayer = null;
        let sections = [];
        let baseMaps = {};

        // 1. Initialize Map with Google Layers
        function initMap() {
            // Google Maps Tile URLs (Idiot-proof / No API Key required)
            const googleTerrain = L.tileLayer('http://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Maps'
            });
            const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Maps'
            });
            const googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Maps'
            });

            map = L.map('map', {
                center: [41.8719, 12.5674],
                zoom: 5,
                layers: [googleTerrain] // Default
            });

            baseMaps = {
                "Google Terrain": googleTerrain,
                "Google Satellite": googleSat,
                "Google Streets": googleStreets
            };

            L.control.layers(baseMaps).addTo(map);
        }

        window.onload = initMap;

        // 2. File Handling
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const sectionList = document.getElementById('sectionList');

        dropzone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => parseGPX(event.target.result);
                reader.readAsText(file);
            }
        };

        // 3. GPX Logic
        function parseGPX(xmlText) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");
            sections = [];

            // Extract Tracks (<trk>)
            xml.querySelectorAll('trk').forEach((trk, i) => {
                const name = trk.querySelector('name')?.textContent || `Track ${i+1}`;
                const points = Array.from(trk.querySelectorAll('trkpt')).map(pt => [
                    parseFloat(pt.getAttribute('lat')),
                    parseFloat(pt.getAttribute('lon'))
                ]);
                sections.push({ name, points, type: 'Track', element: trk });
            });

            // Extract Routes (<rte>)
            xml.querySelectorAll('rte').forEach((rte, i) => {
                const name = rte.querySelector('name')?.textContent || `Route ${i+1}`;
                const points = Array.from(rte.querySelectorAll('rtept')).map(pt => [
                    parseFloat(pt.getAttribute('lat')),
                    parseFloat(pt.getAttribute('lon'))
                ]);
                sections.push({ name, points, type: 'Route', element: rte });
            });

            renderList();
        }

        function renderList() {
            sectionList.innerHTML = '';
            document.getElementById('counter').textContent = sections.length;
            document.getElementById('downloadSelected').classList.remove('hidden');

            sections.forEach((sec, i) => {
                const item = document.createElement('div');
                item.className = "p-4 hover:bg-slate-50 cursor-pointer flex items-center gap-4 border-l-4 border-transparent transition-all";
                item.id = `item-${i}`;
                item.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-0 cursor-pointer" data-index="${i}">
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-slate-700 truncate">${sec.name}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">${sec.points.length} Points • ${sec.type}</p>
                    </div>
                `;
                item.onclick = (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        document.querySelectorAll('#sectionList > div').forEach(el => el.classList.remove('selected-row'));
                        item.classList.add('selected-row');
                        previewOnMap(i);
                    }
                };
                sectionList.appendChild(item);
            });
        }

        function previewOnMap(index) {
            const sec = sections[index];
            if (currentLayer) map.removeLayer(currentLayer);

            currentLayer = L.polyline(sec.points, {
                color: '#2563eb',
                weight: 5,
                opacity: 0.8
            }).addTo(map);

            map.fitBounds(currentLayer.getBounds(), { padding: [50, 50] });

            // Update Overlay
            document.getElementById('mapOverlay').classList.remove('hidden');
            document.getElementById('overlayName').textContent = sec.name;
            document.getElementById('overlayPoints').textContent = sec.points.length;
            document.getElementById('overlayType').textContent = sec.type;
        }

        // 4. Exporting
        document.getElementById('downloadSelected').onclick = async () => {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checkboxes.length === 0) return alert("Select at least one section");

            const zip = new JSZip();
            
            checkboxes.forEach(cb => {
                const idx = cb.dataset.index;
                const sec = sections[idx];
                const gpxContent = createGPX(sec);
                const safeName = sec.name.replace(/[/\\?%*:|"<>]/g, '-') + '.gpx';
                zip.file(safeName, gpxContent);
            });

            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "split_trails.zip";
            link.click();
        };

        function createGPX(sec) {
            const xmlHeader = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPX Trail Splitter" xmlns="http://www.topografix.com/GPX/1/1">
<metadata><name>${sec.name}</name></metadata>`;
            const xmlFooter = `</gpx>`;
            const content = new XMLSerializer().serializeToString(sec.element);
            return xmlHeader + content + xmlFooter;
        }
    </script>
</body>
</html>
